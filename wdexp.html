<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision Tools Inc.</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Navbar */
nav {
    position: sticky;
    top: 0;
    background: #1a1a1a;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* Hero Section */
.hero {
    height: 90vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1581091870627-3c1e0a2e6f52');
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 48px;
}

.hero p {
    margin: 20px 0;
}

.btn {
    padding: 12px 25px;
    background: yellow;
    color: dark blue;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

/* Section */
section {
    padding: 50px 20px;
    text-align: center;
}

/* Team Cards */
.team-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    width: 250px;
    padding: 20px;
    background: #f4f4f4;
    border-radius: 10px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* Contact Form */
form {
    max-width: 400px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input, textarea {
    padding: 10px;
    border: 1px solid #ccc;
}

.error {
    color: red;
    font-size: 14px;
}

/* Responsive */
@media (max-width: 768px) {
    .hero h1 {
        font-size: 30px;
    }
    .team-container {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>Precision Tools Inc.</h2>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#team">Team</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Hero Section -->
<div class="hero" id="home">
    <div>
        <h1>Modern Manufacturing Solutions</h1>
        <p>Precision Tools Inc. delivers high-quality tools for your industry.</p>
        <button class="btn">Get Started</button>
    </div>
</div>

<!-- Team Section -->
<section id="team">
    <h2>Meet the Team</h2>
    <div class="team-container">
        <div class="card">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>John Smith</h3>
            <p>CEO</p>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Sarah Lee</h3>
            <p>Production Manager</p>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/250" alt="">
            <h3>Michael Brown</h3>
            <p>Lead Engineer</p>
        </div>
    </div>
</section>

<!-- Contact Section -->
<section id="contact">
    <h2>Contact Us</h2>
    <form id="contactForm">
        <input type="text" id="name" placeholder="Your Name">
        <span class="error" id="nameError"></span>

        <input type="email" id="email" placeholder="Your Email">
        <span class="error" id="emailError"></span>

        <textarea id="message" placeholder="Your Message"></textarea>
        <span class="error" id="messageError"></span>

        <button type="submit" class="btn">Send Message</button>
    </form>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let valid = true;

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let message = document.getElementById("message").value.trim();

    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("messageError").innerText = "";

    if (name === "") {
        document.getElementById("nameError").innerText = "Name is required";
        valid = false;
    }

    if (email === "" || !email.includes("@")) {
        document.getElementById("emailError").innerText = "Valid email required";
        valid = false;
    }

    if (message === "") {
        document.getElementById("messageError").innerText = "Message cannot be empty";
        valid = false;
    }

    if (valid) {
        alert("Form submitted successfully!");
        document.getElementById("contactForm").reset();
    }
});
</script>

</body>
</html>
