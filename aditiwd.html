<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precision Tools Inc.</title>

<style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* Navbar */
header {
  position: sticky;
  top: 0;
  background: #222;
  padding: 15px 0;
  z-index: 1000;
}

nav {
  display: flex;
  justify-content: space-around;
  align-items: center;
}

nav h2 {
  color: #fff;
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin: 0 15px;
}

nav ul li a {
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

nav ul li a:hover {
  color: orange;
}

/* Hero Section */
.hero {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('https://images.unsplash.com/photo-1581092919535-3f45d6c9a2b3');
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
}

.hero p {
  margin: 15px 0;
}

.hero button {
  padding: 10px 20px;
  background: orange;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  background: darkorange;
}

/* Section */
section {
  padding: 40px;
  text-align: center;
}

/* Team Cards */
.team {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  width: 250px;
  padding: 20px;
  border-radius: 10px;
  background: #f4f4f4;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* Contact Form */
form {
  max-width: 400px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button.submit-btn {
  background: #222;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

/* Footer */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 15px;
}

/* Responsive */
@media (max-width: 768px) {
  .team {
    flex-direction: column;
    align-items: center;
  }
}
</style>

</head>

<body>

<!-- Navbar -->
<header>
  <nav>
    <h2>Precision Tools</h2>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#team">Team</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- Hero Section -->
<div class="hero">
  <div>
    <h1>Welcome to Precision Tools Inc.</h1>
    <p>High-quality manufacturing solutions for modern industries</p>
    <button onclick="alert('Welcome!')">Get Started</button>
  </div>
</div>

<!-- Team Section -->
<section id="team">
  <h2>Meet the Team</h2>
  <div class="team">
    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTR77_Y0Na_t_INY7YJegDvc7WeaTOnIFkyVw&s">
      <h3>John Doe</h3>
      <p>CEO</p>
    </div>

    <div class="card">
      <img src="https://media.defense.gov/2019/Feb/13/2002089515/-1/-1/0/180709-A-SP580-001.JPG">
      <h3>Jane Smith</h3>
      <p>Engineer</p>
    </div>

    <div class="card">
      <img src="https://media.licdn.com/dms/image/v2/C4D03AQE9Fg2rJ3OIpQ/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1623489924746?e=2147483647&v=beta&t=s1oWcYId7-eG1q9XUMO9592VxvmCfJ2S2HQUgT_LqOU">
      <h3>Mike Johnson</h3>
      <p>Designer</p>
    </div>
  </div>
</section>

<!-- Contact Section -->
<section id="contact">
  <h2>Contact Us</h2>
  <form onsubmit="return validateForm()">
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>
    <button type="submit" class="submit-btn">Send</button>
  </form>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 Precision Tools Inc.</p>
</footer>

<script>
function validateForm() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;

  if (name === "" || email === "" || message === "") {
    alert("All fields are required!");
    return false;
  }

  if (!email.includes("@")) {
    alert("Enter a valid email!");
    return false;
  }

  alert("Form submitted successfully!");
  return true;
}
</script>

</body>
</html>
